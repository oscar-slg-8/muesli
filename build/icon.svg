<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Icône Muesli — bol & flocons blancs sur fond jaune (jaune emoji), 2D flat.
       macOS 11+ : l'app fournit la forme arrondie AVEC ses marges transparentes.
       On dessine donc un fond jaune en squircle dans la "safe area" Apple
       (824×824 centré dans 1024) — ne PAS remplir tout le carré. -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="#FFCC4D"/>

  <!-- Bol -->
  <path d="M232 498 A280 280 0 0 0 792 498 Z" fill="#FFFFFF"/>
  <ellipse cx="512" cy="498" rx="280" ry="60" fill="#FFFFFF"/>

  <!-- Flocons -->
  <circle cx="399" cy="353" r="54" fill="#FFFFFF"/>
  <circle cx="544" cy="315" r="70" fill="#FFFFFF"/>
  <circle cx="657" cy="374" r="46" fill="#FFFFFF"/>
</svg>
